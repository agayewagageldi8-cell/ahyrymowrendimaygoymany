<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modern Hesap Makinesi | Ücretsiz Araç</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* butonlarda metin seçilmeyi engeller */
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* ana kart */
        .calculator-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .calculator {
            background: #0b1120;
            border-radius: 44px;
            padding: 24px 20px 28px 20px;
            box-shadow: inset 0 0 8px #00000030, 0 12px 28px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        /* ekran */
        .screen {
            background: #0a0f1c;
            border-radius: 32px;
            padding: 25px 20px;
            margin-bottom: 30px;
            text-align: right;
            box-shadow: inset 0 2px 5px #00000055, 0 1px 0 #2a3448;
            border-bottom: 2px solid #2a3a55;
        }

        #expression {
            font-size: 1.3rem;
            color: #7f8ea3;
            letter-spacing: 0.5px;
            word-break: break-word;
            min-height: 42px;
            font-family: 'Courier New', monospace;
            font-weight: 500;
        }

        #result {
            font-size: 3.2rem;
            font-weight: 700;
            color: #f1f5f9;
            word-break: break-word;
            line-height: 1.2;
            min-height: 80px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: -0.5px;
        }

        /* buton grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            background: #1e293b;
            border: none;
            padding: 18px 0;
            font-size: 1.7rem;
            font-weight: 600;
            border-radius: 38px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #0f1119;
            font-family: monospace;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1119;
        }

        /* özel buton renkleri */
        .op-btn {
            background: #ff8c42;
            color: #0f172a;
            box-shadow: 0 5px 0 #b95a1a;
            font-weight: 800;
        }

        .eq-btn {
            background: #2dd4bf;
            color: #0a0f1c;
            box-shadow: 0 5px 0 #168f7c;
            font-size: 2rem;
            font-weight: bold;
        }

        .clear-btn {
            background: #ef4444;
            color: white;
            box-shadow: 0 5px 0 #9b2c2c;
        }

        .del-btn {
            background: #475569;
            box-shadow: 0 5px 0 #1e293b;
        }

        .zero-btn {
            grid-column: span 2;
        }

        /* yanıt kopyalama bildirimi */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293be6;
            backdrop-filter: blur(12px);
            color: #cbd5e1;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 1000;
            border: 1px solid #5b6e8c;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        @media (max-width: 500px) {
            .calculator {
                padding: 18px 14px 22px 14px;
            }
            button {
                padding: 14px 0;
                font-size: 1.5rem;
            }
            #result {
                font-size: 2.6rem;
            }
            .buttons {
                gap: 10px;
            }
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="calculator-card">
    <div class="calculator">
        <div class="screen">
            <div id="expression">0</div>
            <div id="result">0</div>
        </div>

        <div class="buttons">
            <!-- 1. satır -->
            <button class="clear-btn" data-action="clear">AC</button>
            <button class="del-btn" data-action="del">⌫</button>
            <button class="op-btn" data-op="%">%</button>
            <button class="op-btn" data-op="/">÷</button>

            <!-- 2. satır -->
            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="op-btn" data-op="*">×</button>

            <!-- 3. satır -->
            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button class="op-btn" data-op="-">-</button>

            <!-- 4. satır -->
            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button class="op-btn" data-op="+">+</button>

            <!-- 5. satır -->
            <button data-num="0" class="zero-btn">0</button>
            <button data-num=".">.</button>
            <button class="eq-btn" data-action="equal">=</button>
        </div>
    </div>
    <footer>✔️ Hesapla | 📋 Sonuç butona tıklayarak kopyalanır</footer>
</div>

<div id="toastMsg" class="toast">📋 Sonuç panoya kopyalandı!</div>

<script>
    // DOM Elemanları
    const expressionDiv = document.getElementById('expression');
    const resultDiv = document.getElementById('result');

    // Durum
    let currentExpression = '0';    // kullanıcının girdiği ifade (gösterilen)
    let lastResult = null;           // son hesaplanan değer (sürekli kullanım için)
    let waitingForOperand = false;   // eşittir sonrası yeni sayıya başlama durumu
    let lastOperator = null;          // opsiyonel (tam kontrollü değil ama kolaylık)
    
    // Referanslar
    const toast = document.getElementById('toastMsg');

    // ---------- Yardımcı fonksiyonlar ----------
    function showToast(message = "📋 Sonuç panoya kopyalandı!") {
        toast.textContent = message;
        toast.classList.remove('show');
        // force reflow
        void toast.offsetWidth;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 1800);
    }

    // ekranı güncelle
    function updateDisplay() {
        expressionDiv.innerText = currentExpression === '' ? '0' : currentExpression;
        // eğer sonuç geçerli bir sayı değilse '0' göster
        let resultText = resultDiv.innerText;
        if (resultText === '' || resultText === undefined) resultDiv.innerText = '0';
    }

    // sayı/yüzde vb ile ifadeyi temizleme kuralları
    function appendToExpression(value) {
        // Eğer son "=" yapıldıysa ve bir sayıya basılıyorsa eski ifadeyi sıfırla
        if (waitingForOperand === true && !isNaN(value) && value !== '.') {
            currentExpression = value;
            waitingForOperand = false;
            lastOperator = null;
            resultDiv.innerText = '';
        } 
        else if (waitingForOperand === true && value === '.') {
            // yeni ondalık başlangıcı
            currentExpression = '0.';
            waitingForOperand = false;
            resultDiv.innerText = '';
        }
        else {
            // normal ekleme
            if (currentExpression === '0' && value !== '.' && !isNaN(value)) {
                currentExpression = value;
            } 
            else if (value === '.' && currentExpression.includes('.')) {
                // zaten ondalık varsa ekleme yapma
                return;
            }
            else {
                currentExpression += value;
            }
        }
        
        // çok uzun ifadeleri kırp (opsiyonel)
        if (currentExpression.length > 40) currentExpression = currentExpression.slice(0, 40);
        updateDisplay();
        // sonuç alanı silinmiş olabilir, eğer expression değiştiyse eşitlik sonrası sonucu temizle
        if (!waitingForOperand) {
            // eğer yeni bir sayı girişi ve önceden result varsa ama kullanıcı sayıya bastı -> sonucu temizle
            // fakat özellikle eşittir sonrası waitingForOperand false olduğu için sonuç silindi zaten.
            if(resultDiv.innerText !== '0' && !isNaN(value)){
                resultDiv.innerText = '';
            }
        }
        updateDisplay();
    }

    // operatör ekleme (+, -, *, /, %)
    function appendOperator(op) {
        // Operatör simgelerini güzel gösterme (÷, ×)
        let displayOp = op;
        if (op === '/') displayOp = '÷';
        if (op === '*') displayOp = '×';
        
        // Eğer beklenen operand modunda (yani = den sonra) ve operatör gelirse; mevcut sonucu kullanarak yeni işleme başla
        if (waitingForOperand === true && lastResult !== null) {
            currentExpression = lastResult.toString();
            waitingForOperand = false;
        }
        
        // Eğer ifade boş veya sadece 0 ise ve operatör eklenecekse, önüne 0 koy (negatif işareti olabilir)
        if (currentExpression === '' || currentExpression === '0') {
            if (op === '-') {
                currentExpression = '-';
                updateDisplay();
                return;
            } else {
                currentExpression = '0';
            }
        }
        
        // son karakter operatör mü kontrol et (÷, ×, +, -, %)
        const lastChar = currentExpression.slice(-1);
        const ops = ['+', '-', '*', '/', '%'];
        const displayOps = ['+', '-', '×', '÷', '%'];
        const isLastCharOperator = ops.some(o => o === lastChar) || displayOps.some(d => d === lastChar);
        
        if (isLastCharOperator) {
            // son operatörü yenisiyle değiştir
            if (op === '-') {
                // özel durum: eğer son karakter operatör ve yeni gelen - ise aslında negatif işareti eklemek isteyebilir.
                // Ancak kolaylık: operatör değiştir.
                let newExpr = currentExpression.slice(0, -1) + (op === '/' ? '÷' : (op === '*' ? '×' : op));
                currentExpression = newExpr;
            } else {
                let newExpr = currentExpression.slice(0, -1) + (op === '/' ? '÷' : (op === '*' ? '×' : op));
                currentExpression = newExpr;
            }
        } else {
            currentExpression += (op === '/' ? '÷' : (op === '*' ? '×' : op));
        }
        
        waitingForOperand = false;
        updateDisplay();
    }

    // temizleme (AC)
    function clearAll() {
        currentExpression = '0';
        resultDiv.innerText = '0';
        waitingForOperand = false;
        lastResult = null;
        lastOperator = null;
        updateDisplay();
    }

    // silme (son karakter)
    function deleteLast() {
        if (waitingForOperand) {
            // eğer eşittir sonrası bekleme modunda ise ve silme yapılırsa eski ifadeye dön?
            waitingForOperand = false;
            if(lastResult !== null) currentExpression = lastResult.toString();
            else currentExpression = '0';
            resultDiv.innerText = '';
            updateDisplay();
            return;
        }
        
        if (currentExpression.length === 1 || (currentExpression.length === 2 && currentExpression.startsWith('-'))) {
            currentExpression = '0';
        } else {
            currentExpression = currentExpression.slice(0, -1);
            if (currentExpression === '') currentExpression = '0';
        }
        updateDisplay();
        // sonuç alanını da temizleme (kullanıcı yeni düzenleme yapıyor)
        if(resultDiv.innerText !== '0') resultDiv.innerText = '';
    }

    // ifadeyi matematiksel olarak hesapla (÷ ve × dönüşümleri yaparak)
    function calculateExpression(expr) {
        // önce görsel ÷ ve × işaretlerini gerçek operatörlere çevir
        let mathExpr = expr.replace(/÷/g, '/').replace(/×/g, '*');
        // yüzde işlemleri: % için özel yaklaşım: sayı% olarak gördüğümüzde /100 yapmak. 
        // Daha doğrusu basit hesap makinesi mantığı: mesela 50+20% = 50 + (50*20/100)=60 gibi
        // Kullanıcı % tuşuna basınca doğrudan işlem yapmak daha sağlıklı. Ama burada butonla % işlemini ayrı yapalım.
        // Aslında % butonuna basınca anında bir işlem uygulanmalı. Bunu buton dinleyicisinde yapacağız.
        // Fakat expression içinde % varsa 'eval' öncesi düzgün halini alalım: örn 10+20% => 10+(10*20/100)
        // Karmaşık. Modern hesap makinelerinde % butonu anında işlem yapar.
        // Daha stabil: % butonunu ayrı bir handler ile yapalım, normal ifade üzerinde % kullanmayacağız.
        // O yüzden eğer expr içinde % karakteri kaldıysa onu standarda çevirmeye uğraşmayalım, direkt replace edip hata vermesin.
        if (mathExpr.includes('%')) {
            // basit yaklaşım: kullanıcı % yazmışsa değerlendirme yapma, ama biz %'ü ayrı fonksiyonla ele alıyoruz.
            // Fakat yine de güvenlik: eval hata fırlatabilir. Bu durumda 'Geçersiz' döndür.
            return 'Hata';
        }
        try {
            // Function ile daha güvenli eval benzeri (sayısal ifadeler için)
            const compute = new Function('return (' + mathExpr + ')');
            let result = compute();
            if (isNaN(result) || !isFinite(result)) {
                return 'Hata';
            }
            // ondalık kontrol
            return parseFloat(result.toFixed(8)).toString();
        } catch (e) {
            return 'Hata';
        }
    }

    // eşittir işlemi
    function evaluateEqual() {
        if (waitingForOperand) {
            // zaten bir eşitlik yapılmış, tekrar eşitlik son işlemi tekrarlar (opsiyonel)
            if(lastResult !== null && lastOperator) {
                // basitçe eski sonucu koru, istersen aynı ifade üzerinde işlem yap
                // ama daha temiz: eski ifadeyi göster
                return;
            }
            return;
        }
        
        if (currentExpression === '' || currentExpression === '0') {
            resultDiv.innerText = '0';
            return;
        }
        
        // expression geçerliliğini kontrol: son karakter operatör ise hata
        let lastChar = currentExpression.slice(-1);
        if (lastChar === '+' || lastChar === '-' || lastChar === '×' || lastChar === '÷' || lastChar === '%') {
            resultDiv.innerText = 'Hata';
            showToast('❌ İfade operatörle bitemez');
            return;
        }
        
        let rawResult = calculateExpression(currentExpression);
        if (rawResult === 'Hata') {
            resultDiv.innerText = 'Hata';
            showToast('Geçersiz ifade');
            return;
        }
        
        // Sonucu float sayıya dönüştür, gereksiz sıfırları yok et
        let numericResult = parseFloat(rawResult);
        let displayResult = Number.isInteger(numericResult) ? numericResult.toString() : numericResult.toFixed(8).replace(/\.?0+$/, '');
        resultDiv.innerText = displayResult;
        
        // Gelecek işlemler için state
        lastResult = displayResult;
        waitingForOperand = true;   // yeni sayıya geçiş için bekleniyor
        
        // Sonuç kopyalama butonuna kolay erişim için sonucu bir değişkende tut
        // ama kullanıcı istediği zaman ekrandaki sonuca tıklayarak kopyalayabilir.
        updateDisplay();
    }

    // Yüzde işlemi: mevcut görünen sayıya (veya ifade sonundaki sayıya) yüzde uygula
    // Basit hesap makinesi mantığı: eğer bir operatör varsa son sayıyı yüzde olarak dönüştür.
    function applyPercentage() {
        if (waitingForOperand && lastResult !== null) {
            // sonuç üzerinde % = sonuç / 100
            let val = parseFloat(lastResult);
            if (isNaN(val)) return;
            let percVal = val / 100;
            resultDiv.innerText = percVal.toString();
            currentExpression = percVal.toString();
            waitingForOperand = true;
            lastResult = percVal.toString();
            updateDisplay();
            return;
        }
        
        // normal ifade içinde son sayıyı bulup yüzdeye çevir.
        let expr = currentExpression;
        // son sayıyı ve operatörleri ayır
        let match = expr.match(/([\d\.\-]+)(?!.*[\d\.\-])/); // son sayısal token
        if (!match) return;
        let lastNumber = match[0];
        let lastNumberIndex = expr.lastIndexOf(lastNumber);
        let beforePart = expr.slice(0, lastNumberIndex);
        let numeric = parseFloat(lastNumber);
        if (isNaN(numeric)) return;
        let percentValue = numeric / 100;
        
        // eğer öncesinde bir operatör varsa + veya - gibi, yüzde işlemi farklı: mesela 50+20% = 50+10 =60 
        // profesyonel: ama basitçe değeri değiştirirsek yeter
        let newExpr = beforePart + percentValue.toString();
        currentExpression = newExpr;
        updateDisplay();
    }

    // sonucu panoya kopyala (istenirse ekrandaki sonuç veya ifade)
    function copyResultToClipboard() {
        let copyText = resultDiv.innerText;
        if (copyText === '0' && currentExpression !== '0' && waitingForOperand === false) {
            // eğer sonuç 0 ise ama henüz hesaplanmamışsa expression gösterilebilir.
            copyText = currentExpression;
        }
        if (copyText === 'Hata') {
            showToast('⚠️ Hata sonucu kopyalanamaz');
            return;
        }
        navigator.clipboard.writeText(copyText).then(() => {
            showToast(`📋 ${copyText} kopyalandı!`);
        }).catch(() => {
            showToast('❌ Kopyalama başarısız');
        });
    }

    // sonuç alanına tıklama ile kopyalama özelliği
    resultDiv.addEventListener('click', () => {
        if (resultDiv.innerText !== '0' && resultDiv.innerText !== 'Hata') {
            copyResultToClipboard();
        } else if (currentExpression !== '0') {
            // sonuç sıfır ama ifade varsa ifadeyi kopyala
            navigator.clipboard.writeText(currentExpression).then(() => {
                showToast(`📝 İfade: ${currentExpression} kopyalandı`);
            });
        } else {
            showToast('Kopyalanacak bir şey yok');
        }
    });

    // ---------- Buton Olayları Dinleme ----------
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            // sayı tuşları
            if (btn.hasAttribute('data-num')) {
                let numVal = btn.getAttribute('data-num');
                appendToExpression(numVal);
            }
            // operatör
            else if (btn.hasAttribute('data-op')) {
                let op = btn.getAttribute('data-op');
                appendOperator(op);
            }
            // özel aksiyonlar
            else if (btn.getAttribute('data-action') === 'clear') {
                clearAll();
            }
            else if (btn.getAttribute('data-action') === 'del') {
                deleteLast();
            }
            else if (btn.getAttribute('data-action') === 'equal') {
                evaluateEqual();
            }
            // eğer % butonu (data-op="%") ayrıca ekstra işlem yap
            if (btn.getAttribute('data-op') === '%') {
                applyPercentage();
            }
        });
    });

    // Klavye desteği (güzel ekstra)
    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if ((key >= '0' && key <= '9') || key === '.') {
            appendToExpression(key);
        } else if (key === '+' || key === '-' || key === '*' || key === '/') {
            let mapped = key;
            if (key === '*') mapped = '*';
            if (key === '/') mapped = '/';
            appendOperator(mapped);
        } else if (key === '%') {
            applyPercentage();
        } else if (key === 'Enter' || key === '=') {
            evaluateEqual();
        } else if (key === 'Escape') {
            clearAll();
        } else if (key === 'Backspace') {
            deleteLast();
        }
    });

    // başlangıç gösterimi
    updateDisplay();
</script>
</body>
</html>
